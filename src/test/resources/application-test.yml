spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: localhost
      port: 6379

aws:
  dynamodb:
    endpoint: http://localhost:4566
    region: us-east-1
    access-key: test
    secret-key: test
    table-name: url
  cloud:
    credentials:
      use-default-aws-credentials-chain: false

app:
  base-url: "http://localhost:8080"
  hashids:
    salt: "6tqpVWWvusxiDnK0iHXD5xsNBTSkN/BV7ojsWkjBu10="
    min-length: 7
  id-generator:
    block-size: 1000
  security:
    jwt:
      secret: "rTtcljj9j9k16M65zQOnxjc1ujxwmyrmAVOJZ1dlEws="
      issuer: ${spring.application.name}
      access-token-expiration-minutes: 15
