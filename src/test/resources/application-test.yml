spring:
  datasource:
    url: 'jdbc:h2:mem:url_shortener_audit;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE DOMAIN IF NOT EXISTS citext AS VARCHAR\;CREATE DOMAIN IF NOT EXISTS inet AS VARCHAR'
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: localhost
      port: 6379

aws:
  dynamodb:
    endpoint: http://localhost:4566
    region: us-east-1
    access-key: test
    secret-key: test
    table-name: url
  cloud:
    credentials:
      use-default-aws-credentials-chain: false

app:
  base-url: "http://localhost:8080"
  hashids:
    salt: "6tqpVWWvusxiDnK0iHXD5xsNBTSkN/BV7ojsWkjBu10="
    min-length: 7
  id-generator:
    block-size: 1000
