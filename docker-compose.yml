services:
  postgres:
    image: postgres:16.3-alpine
    container_name: originalUrl-shortener-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: url_shortener
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      TZ: UTC
      PGTZ: UTC
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U app_user -d url_shortener",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - local-net

  redis:
    image: redis:7.2-alpine
    container_name: originalUrl-shortener-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - local-net

  localstack:
    image: localstack/localstack:3.0.0
    container_name: originalUrl-shortener-aws
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      - SERVICES=dynamodb
      - DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - ./localstack-init:/etc/localstack/init/ready.d
    networks:
      - local-net

networks:
  local-net:
    driver: bridge

volumes:
  postgres-data:

