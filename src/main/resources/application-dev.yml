spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:url_shortener}
    username: ${DB_USER:app_user}
    password: ${DB_PASSWORD:app_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: UrlShortenerHikariPool
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      validation-timeout: 5000
      leak-detection-threshold: 60000
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379

aws:
  dynamodb:
    endpoint: http://localhost:4566
    region: us-east-1
    access-key: test
    secret-key: test
    table-name: url
  cloud:
    credentials:
      use-default-aws-credentials-chain: false

app:
  base-url: "http://localhost:8080"
  hashids:
    salt: "6tqpVWWvusxiDnK0iHXD5xsNBTSkN/BV7ojsWkjBu10="
    min-length: 7
  id-generator:
    block-size: 1000