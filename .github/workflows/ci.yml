name: Pipeline CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Testes Unitários
  unit-tests:
    uses: ./.github/workflows/reusable-test-runner.yml
    with:
      maven_command: './mvnw -B test -Dgroups="unit"'

  # 2. Testes de Slice
  slice-tests:
    needs: unit-tests
    strategy:
      fail-fast: false # Se o web-slice falhar, não cancela o jpa-slice e redis-slice
      matrix:
        slice: [ "web-slice", "jpa-slice", "redis-slice" ]
    uses: ./.github/workflows/reusable-test-runner.yml
    with:
      maven_command: './mvnw -B test -Dgroups="${{ matrix.slice }}"'

  # 3. Testes E2E
  integration-tests:
    needs: slice-tests
    uses: ./.github/workflows/reusable-test-runner.yml
    with:
      maven_command: './mvnw -B verify -Dgroups="integration"'

  # 3. Build e Push da Imagem
  build-and-push:
    runs-on: ubuntu-latest
    needs: [ integration-tests ]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Baixar código-fonte
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Dar permissão de execução
        run: chmod +x mvnw

      - name: Build do JAR com Maven
        run: ./mvnw -B -DskipTests clean package

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados para Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short

      - name: Build e Push da Imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}